<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>ADMIN - Export Excel</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<style>
body { font-family: sans-serif; background: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
.card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 400px; }
button { background: #8b3a1a; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; width: 100%; margin-top: 20px; }
#status { margin-top: 20px; font-size: 13px; color: #d9534f; font-weight: bold; }
</style>
</head>
<body>
<div class="card">
<h2>🛡️ Panel Admin</h2>
<p>Cliquez pour exporter TOUTES les données.</p>
<button id="btnExport" onclick="exporterExcel()">📊 TÉLÉCHARGER EXCEL</button>
<div id="status"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBMWubhD-VQk8EPDubJbQSNfdXAwIXlNgk",
authDomain: "production-dattes.firebaseapp.com",
projectId: "production-dattes",
storageBucket: "production-dattes.firebasestorage.app",
messagingSenderId: "862022813229",
appId: "1:862022813229:web:b48eda4a0e422f804e1aa4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.exporterExcel = async () => {
const status = document.getElementById('status');
status.style.color = "#666";
status.textContent = "⏳ Connexion à Firebase...";

try {
// Test de lecture simple sans tri pour éviter les erreurs d'index
const querySnapshot = await getDocs(collection(db, "saisons"));

if (querySnapshot.empty) {
status.textContent = "⚠ La base de données est vide.";
return;
}

const data = querySnapshot.docs.map(doc => {
const d = doc.data();
return {
"Exploitation": d.nom || "N/A",
"Région": d.region || "N/A",
"Production (kg)": d.production || 0,
"Année": d.annee || ""
};
});

const ws = XLSX.utils.json_to_sheet(data);
const wb = XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb, ws, "Données");
XLSX.writeFile(wb, "Export_Dattes_Oasis.xlsx");

status.style.color = "green";
status.textContent = "✅ Export réussi !";
} catch (e) {
console.error(e);
status.style.color = "red";
status.textContent = "❌ Erreur : " + e.message;
}
};
</script>
</body>
</html>
